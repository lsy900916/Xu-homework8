version: '3.8'

services:
  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    container_name: xu-news-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - xu-news-network
    restart: unless-stopped

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    container_name: xu-news-backend
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///data/xu_news.db
      - OLLAMA_HOST=http://ollama:11434
      - REDIS_HOST=redis
      - REDIS_ENABLED=true
    env_file:
      - ../.env
    volumes:
      - ../backend/data:/app/data
      - ../logs:/app/logs
    depends_on:
      - ollama
      - redis
    networks:
      - xu-news-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Ollama 服务 ====================
  ollama:
    image: ollama/ollama:latest
    container_name: xu-news-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - xu-news-network
    restart: unless-stopped
    # GPU 支持（如果有 NVIDIA GPU）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ==================== n8n 工作流引擎 ====================
  n8n:
    image: n8nio/n8n:latest
    container_name: xu-news-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123  # 生产环境请修改
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - xu-news-network
    restart: unless-stopped

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: xu-news-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - xu-news-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ==================== Nginx 反向代理（可选）====================
  nginx:
    image: nginx:alpine
    container_name: xu-news-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL 证书目录
    depends_on:
      - frontend
      - backend
    networks:
      - xu-news-network
    restart: unless-stopped

# ==================== 网络配置 ====================
networks:
  xu-news-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  ollama_data:
    driver: local
  n8n_data:
    driver: local
  redis_data:
    driver: local

